server {
    listen       8080;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos
    location ~* \.(css|js|png|jpg|ico|svg)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    error_page 404 /index.html;
}
