name: CI/CD — Lint, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────
  # JOB 1: Lint (HTMLHint + stylelint)
  # ────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linters
        run: npm install -g htmlhint stylelint stylelint-config-standard

      - name: Lint HTML
        run: htmlhint index.html --config .htmlhintrc

      - name: Lint CSS
        run: stylelint style.css --config .stylelintrc.json

  # ────────────────────────────────────────────
  # JOB 2: Build (valida o build Docker)
  # ────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ds881-curriculo:ci .

      - name: Smoke test — container sobe e responde na porta 8080
        run: |
          docker run -d --name smoke -p 8080:8080 ds881-curriculo:ci
          sleep 3
          curl --fail http://localhost:8080 || (docker logs smoke && exit 1)
          docker stop smoke

      - name: Upload artifact para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          # Exclui arquivos desnecessários do deploy
          exclude: |
            Dockerfile
            docker-compose.yml
            nginx.conf
            .github
            .htmlhintrc
            .stylelintrc.json
            README.md

  # ────────────────────────────────────────────
  # JOB 3: Deploy → GitHub Pages (só na main)
  # ────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
